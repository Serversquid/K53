name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install numpy matplotlib scikit-learn pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "GLOSA_Advanced" glosa_advanced.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: GLOSA_Advanced_EXE
          path: dist/GLOSA_Advanced.exe
